# ========================================
# alembic.ini - Alembic Configuration
# ========================================

[alembic]
# Alembic folder ka path - project root se relative
script_location = alembic

# Migrations file ka naam format
file_template = %%(rev)s_%%(slug)s

# Timezone
timezone = UTC

# Database URL - env.py mein .env se override hogi
sqlalchemy.url = 

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
